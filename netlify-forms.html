<!DOCTYPE html>
<html lang="fr">
<head>
<!-- Google tag (gtag.js) --><script async src="https://www.googletagmanager.com/gtag/js?id=G-N6DJGLCH77"></script><script>window.dataLayer = window.dataLayer || [];function gtag(){dataLayer.push(arguments);}gtag('js', new Date());gtag('config', 'G-N6DJGLCH77');</script>
  <meta charset="UTF-8">
  <title>Netlify Forms Registration</title>
</head>
<body>
  <!-- Fichier de détection pour que Netlify enregistre le formulaire au build -->
  <form name="contact" method="POST" data-netlify="true" netlify netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="contact" />
    <input type="text" name="name" />
    <input type="text" name="company" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <input type="text" name="subject" />
    <textarea name="message"></textarea>
    <input type="checkbox" name="privacy" />
    <input name="bot-field" />
  </form>
</body>
</html>
