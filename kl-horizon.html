<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K&L Global Import - Horizon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #000; color: #fff; font-family: Arial, sans-serif;">
    <header>
        <nav style="display: flex; justify-content: space-between; align-items: center; padding: 20px;">
            <div class="logo">
                <img src="assets/header-logo.jpeg" alt="Logo K&L" style="max-height: 70px;">
            </div>
            <ul style="list-style: none; display: flex; gap: 20px;">
                <li><a href="index.html" style="color: #fff; text-decoration: none;">Accueil</a></li>

    <main style="padding: 40px; text-align: center;">
        <section class="hero">
